# ==========================================================
# netlify.toml — True Jiu Jitsu Online
# ==========================================================

[build]
  functions = "netlify/functions"
  publish   = "."

[build.environment]
  NODE_VERSION = "18"
  # These two values are intentionally public (Supabase anon key and URL
  # are designed to be exposed client-side). Tell Netlify's secrets
  # scanner to ignore them so the build doesn't fail.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY"

# Redirect /admin to the admin index page
[[redirects]]
  from = "/admin"
  to   = "/pages/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to   = "/pages/admin/:splat"
  status = 200

# Redirect all member pages cleanly
[[redirects]]
  from = "/catalogue"
  to   = "/pages/catalogue.html"
  status = 200

[[redirects]]
  from = "/playlist"
  to   = "/pages/playlist.html"
  status = 200

[[redirects]]
  from = "/subscribe"
  to   = "/pages/subscribe.html"
  status = 200

[[redirects]]
  from = "/account"
  to   = "/pages/account.html"
  status = 200
