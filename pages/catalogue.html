<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogue — True Jiu Jitsu Online</title>

  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="/img/tjj_favicon.webp">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <!-- Nav injected by nav.js -->

  <!-- ======================================================
       CATALOGUE
       ====================================================== -->
  <main class="catalogue" id="catalogue-main">
    <div class="wrapper">

      <!-- Continue Watching — hidden until data loads and
           only shown if the member has unfinished videos -->
      <section class="catalogue__section" id="continue-watching" style="display:none;">
        <h2 class="catalogue__section-title">Continue Watching</h2>
        <div class="catalogue__grid catalogue__grid--continue" id="continue-watching-grid"></div>
      </section>

      <!-- Playlists section -->
      <section class="catalogue__section" id="playlists-section">

        <!-- Header row: title + filter pills -->
        <div class="catalogue__header">
          <h2 class="catalogue__section-title" id="catalogue-heading">All Playlists</h2>
        </div>

        <!-- Category filter pills — populated by JS -->
        <div class="catalogue__controls">
          <div class="filter-pills" id="category-filters" role="tablist" aria-label="Filter by category"></div>
        </div>

        <!-- Playlist grid — populated by JS -->
        <div class="catalogue__grid" id="playlists-grid"></div>

      </section>

    </div>
  </main>

  <!-- Loading overlay — shown while data is fetching -->
  <div class="catalogue-loading" id="catalogue-loading" aria-live="polite" aria-label="Loading content">
    <div class="spinner"></div>
  </div>

  <!-- Empty state — shown if no playlists exist yet -->
  <div class="empty-state" id="catalogue-empty" style="display:none;">
    <div class="empty-state__icon">🥋</div>
    <h3>Content coming soon</h3>
    <p>Check back shortly — new videos and playlists are on the way.</p>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Scripts — order matters -->
  <script src="/js/supabase-client.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/catalogue.js"></script>

</body>
</html>
