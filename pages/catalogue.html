<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogue — True Jiu Jitsu Online</title>

  <!-- Favicon -->
  <link rel="icon" type="image/webp" href="/img/tjj_favicon.webp">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <!-- Nav injected by nav.js -->

  <!-- ======================================================
       CATALOGUE
       ====================================================== -->
  <main class="catalogue" id="catalogue-main">
    <div class="wrapper">

      <!-- Continue Watching — hidden until data loads and
           only shown if the member has unfinished videos -->
      <section class="catalogue__section" id="continue-watching" style="display:none;">
        <h2 class="catalogue__section-title">Continue Watching</h2>
        <div class="catalogue__grid catalogue__grid--continue" id="continue-watching-grid"></div>
      </section>

      <!-- Playlists section -->
      <section class="catalogue__section" id="playlists-section">

        <!-- Header row: title + filter pills -->
        <div class="catalogue__header">
          <h2 class="catalogue__section-title" id="catalogue-heading">All Playlists</h2>
        </div>

        <!-- Category filter pills — populated by JS -->
        <div class="catalogue__controls">
          <div class="filter-pills" id="category-filters" role="tablist" aria-label="Filter by category"></div>
        </div>

        <!-- Search + tag filter row -->
        <div class="catalogue__controls" id="search-controls">
          <!-- Text search -->
          <div class="search">
            <svg class="search__icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input
              type="text"
              class="search__input"
              id="catalogue-search"
              placeholder="Search videos and articles…"
              autocomplete="off"
              aria-label="Search content"
            >
          </div>

          <!-- Tag filter picker -->
          <div class="member-tag-picker" id="tag-picker-wrap">
            <input
              type="text"
              class="member-tag-picker__input"
              id="tag-filter-input"
              placeholder="Filter by tag…"
              autocomplete="off"
              readonly
            >
            <div class="member-tag-picker__dropdown" id="tag-picker-dropdown"></div>
          </div>
        </div>

        <!-- Active tag pills -->
        <div class="catalogue__tag-filters" id="active-tag-filters" style="display:none;"></div>

        <!-- Search results — shown instead of playlists when searching -->
        <div id="search-results-section" style="display:none;">
          <p class="catalogue__results-count" id="search-results-count"></p>
          <div class="catalogue__grid" id="search-results-grid"></div>
        </div>

        <!-- Playlist grid — hidden when searching -->
        <div class="catalogue__grid" id="playlists-grid"></div>

      </section>

    </div>
  </main>

  <!-- Loading overlay — shown while data is fetching -->
  <div class="catalogue-loading" id="catalogue-loading" aria-live="polite" aria-label="Loading content">
    <div class="spinner"></div>
  </div>

  <!-- Empty state — shown if no playlists exist yet -->
  <div class="empty-state" id="catalogue-empty" style="display:none;">
    <div class="empty-state__icon">🥋</div>
    <h3>Content coming soon</h3>
    <p>Check back shortly — new videos and playlists are on the way.</p>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Scripts — order matters -->
  <script src="/js/supabase-client.js"></script>
  <script src="/js/analytics.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/catalogue.js"></script>

</body>
</html>
