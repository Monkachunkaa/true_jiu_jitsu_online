<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — True Jiu Jitsu Online</title>
  <link rel="icon" type="image/webp" href="/img/tjj_favicon.webp">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/landing.css">
</head>
<body class="landing-body">

  <!-- Background gym photo -->
  <div class="landing-bg" aria-hidden="true"></div>

  <main class="landing-main">

    <!-- Logo -->
    <a href="/" class="landing-logo" aria-label="True Jiu Jitsu Online">
      <img src="/img/true_jiu_jitsu_logo_white.webp" alt="True Jiu Jitsu">
    </a>

    <!-- Reset card -->
    <div class="auth-card" id="reset-card">

      <!-- New password form — shown when token is valid -->
      <div id="panel-form">
        <div style="padding:var(--space-lg) var(--space-lg) 0;">
          <h2 style="font-size:var(--text-xl);text-transform:none;letter-spacing:0;margin-bottom:var(--space-xs);">
            Set a new password
          </h2>
          <p style="font-size:var(--text-sm);color:var(--color-gray);margin-bottom:0;max-width:none;">
            Choose a strong password of at least 8 characters.
          </p>
        </div>

        <div class="auth-panel">
          <form class="form" id="reset-form" novalidate>

            <div class="form__group">
              <label class="form__label" for="new-password">New Password</label>
              <input
                class="form__input"
                type="password"
                id="new-password"
                placeholder="••••••••"
                autocomplete="new-password"
                minlength="8"
                required
              >
            </div>

            <div class="form__group">
              <label class="form__label" for="confirm-password">Confirm Password</label>
              <input
                class="form__input"
                type="password"
                id="confirm-password"
                placeholder="••••••••"
                autocomplete="new-password"
                minlength="8"
                required
              >
            </div>

            <p class="auth-error" id="reset-error" aria-live="polite"></p>

            <button type="submit" class="btn btn--primary btn--block" id="reset-btn">
              Update Password
            </button>

          </form>
        </div>
      </div>

      <!-- Success state -->
      <div id="panel-success" style="display:none;">
        <div class="auth-panel" style="text-align:center;padding:var(--space-2xl) var(--space-lg);">
          <div class="check-icon" style="margin:0 auto var(--space-lg);">
            <svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>
          </div>
          <h2 style="font-size:var(--text-xl);text-transform:none;letter-spacing:0;margin-bottom:var(--space-sm);">
            Password updated
          </h2>
          <p style="font-size:var(--text-sm);color:var(--color-gray);margin-bottom:var(--space-xl);max-width:none;">
            Your password has been changed successfully.
          </p>
          <a href="/" class="btn btn--primary btn--block">Sign In</a>
        </div>
      </div>

      <!-- Invalid / expired token state -->
      <div id="panel-invalid" style="display:none;">
        <div class="auth-panel" style="text-align:center;padding:var(--space-2xl) var(--space-lg);">
          <p style="font-size:var(--text-2xl);margin-bottom:var(--space-md);">⚠️</p>
          <h2 style="font-size:var(--text-xl);text-transform:none;letter-spacing:0;margin-bottom:var(--space-sm);">
            Link expired
          </h2>
          <p style="font-size:var(--text-sm);color:var(--color-gray);margin-bottom:var(--space-xl);max-width:none;">
            This password reset link has expired or already been used.
            Request a new one from the sign in page.
          </p>
          <a href="/" class="btn btn--secondary btn--block">Back to Sign In</a>
        </div>
      </div>

    </div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-client.js"></script>
  <script src="/js/reset-password.js"></script>

</body>
</html>
